<h1>Switch-statement | Control Statement</h1>

  <select (change)="handleStatus($event)" name="switch-statment" id="switch-statment-select">
    <option style="color: blue;" value="notStarted">Not Started</option>
    <option style="color: orange;" value="loading">Loading...</option>
    <option style="color: green;" value="success">Success</option>
    <option style="color: red;" value="error">Error</option>
  </select>

<div>
  @switch (status()) {
    @case ("notStarted") {
      <span style="color: rgb(93, 84, 219);"><b>status: {{status()}}</b> - Not Started yet</span>
    }
    @case ("loading") {
      <span style="color: orange;"><b>status: {{status()}}</b> - Lodaing...</span>
    }
    @case ("success") {
      <span style="color: green;"><b>status: {{status()}}</b> - Success</span>
    }
    @default {
      <span style="color: red;"><b>status: {{status()}}</b> - Error</span>
    }
  }
</div>
